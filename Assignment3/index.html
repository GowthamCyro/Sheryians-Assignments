<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>
<body>
    <main>
        <div class="header">
            <img src="./assets/logo.png" alt="Logo">
            <div class="header-content">
                <p>About</p>
                <p>Watch Now</p>
                <p>Actors</p>
                <p>Contact</p>
            </div>
            <i class="ri-menu-3-line"></i>
        </div>
        <div class="content">
            <div class="main-content">
                <div class="left-main">
                    <img src="./assets/logo.png" alt="">
                    <p>Action / Thriller / Drama Series directed by Dong-hyuk Hwang Season 1: 9 Episodes</p>
                    <div class="buttons">
                        <button id="button1"><i class="ri-play-circle-line"></i> <span>Play Now</span> </button>
                        <button id="button2"><i class="ri-play-line"></i> <span>Watch Trailer</span> </button>
                    </div>
                    <p id="gameText">GAME</p>
                </div>
                <div class="middle-main">
                    <p style="transform: rotate(270deg); color: white;">SCROLL</p>
                    <div class="line" style="height: 80px; width: 1px; border: 1px solid white;"></div>
                </div>
                <div class="right-main">
                    <img src="./assets/character.png" alt="">
                    <div class="social-icons">
                        <i class="ri-twitter-line"></i>
                        <i class="ri-instagram-line"></i>
                        <i class="ri-facebook-circle-line"></i>
                    </div>
                    <p id="squidText">SQUID</p>
                </div>
            </div>
            <div class="secondary-content">
                <div class="box">
                    <img src="./assets/img1.jpeg" alt="">
                    <img src="./assets/img2.jpeg" alt="">
                    <img src="./assets/img3.jpeg" alt="">
                </div>
            </div>
        </div>
    </main>
</body>
</html>
